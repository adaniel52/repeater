<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repeater</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #186850;
            color: white;
            padding: 24px 0;
        }
        #main-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        #app-icon {
            border-radius: 20px;
        }
        h1 {
            margin-bottom: 0;
        }
        #app-description, #app-version {
            margin-top: 0;
        }
		#app-version {
            font-size: 14px;
		}
        button {
            width: 250px;
            padding: 10px;
            margin: 4px;
            border-radius: 12px;
            border: none;
            font-weight: bolder;
			color: black;
        }
        button:active {
            opacity: .5;
        }
        #android-download-btn {
            background-color: lightgreen;
        }
        .button-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
        }
        .footnote {
            margin-top: 50px;
            font-size: 14px;
            color: lightgray;
        }
    </style>
</head>
<body>
    <div id="main-container">
        <img id="app-icon" src="icon.png" width="200" alt="App Icon">
        <h1>Repeater</h1>
		<p id="app-version">Latest version: v0.1.1</p>
        <p id="app-description">An app to assist hafiz in murajaah Quran.</p>
        <a href="https://github.com/adaniel52/repeater/releases/download/v0.1.1/Repeater.v0.1.1.apk">
            <button id="android-download-btn">
                <div class="button-container">
                    <img src="android.png" height="30" alt="Android Logo">
                    <div style="width: 20px;"></div>           
                    <p>Download for Android</p>
                </div>
            </button>
        </a>
        <a href="https://github.com/adaniel52/repeater/" target="_blank">
            <button>
                <div class="button-container">
                    <img src="github.png" height="30" alt="GitHub Logo">
                    <div style="width: 20px;"></div>           
                    <p>View Source Code</p>
                </div>
            </button>
        </a>
        <p class="footnote">New website looks coming soon..</p>
    </div>
</body>
</html>
